<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - DevCareers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">DevCareers</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="jobs.html">Find Jobs</a></li>
                <li><a href="post-job.html">Post a Job</a></li>
                <li><a href="track.html">Track Applications</a></li>
                <li><a href="login.html" class="nav-btn active">Sign In</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h2>Welcome Back</h2>
            <p class="section-subtitle">Sign in to access your dashboard, jobs, and tracking details.</p>
            <form class="job-form" onsubmit="event.preventDefault(); alert('Logged in successfully!'); location.href='index.html';">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="submit-job-btn">Sign In</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
