<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCareers - Find Your Dream Job</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">DevCareers</div>
        <nav>
            <ul>
                <li><a href="#hero-section">Find Jobs</a></li>
                <li><a href="#post-job-section">Post a Job</a></li>
                <li><a href="#table-section">Track Applications</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="hero-section" class="hero-section">
            <h1>Find Your Dream <br>Tech Job</h1>
            <p>Discover thousands of opportunities in development, design, and product management.</p>
            
            <div class="search-container">
                <input type="text" placeholder="Teacher" value="Teacher">
                <button class="search-btn">Search</button>
            </div>
        </section>

        <section id="post-job-section" class="form-section">
            <h2>Post a New Job Opening</h2>
            <p class="section-subtitle">Fill out the details below to find your next great hire.</p>
            <form class="job-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="company-name">Company Name</label>
                    <input type="text" id="company-name" placeholder="e.g., TechCorp Solutions">
                </div>
                <div class="form-group">
                    <label for="job-role">Job Role / Title</label>
                    <input type="text" id="job-role" placeholder="e.g., Frontend Engineer">
                </div>
                <div class="form-group">
