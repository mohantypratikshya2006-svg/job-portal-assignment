<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCareers - Find Your Dream Job</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="logo">DevCareers</div>
        <nav>
            <ul>
                <li><a href="#">Find Jobs</a></li>
                <li><a href="#">Post a Job</a></li>
                <li><a href="#">Track Applications</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Search Section -->
    <main>
        <section class="hero-section">
            <h1>Find Your Dream <br>Tech Job</h1>
            <p>Discover thousands of opportunities in development, design, and product management.</p>
            
            <div class="search-container">
                <input type="text" placeholder="Teacher" value="Teacher">
                <button class="search-btn">Search</button>
            </div>
        </section>

        <!-- Featured Job Openings Table Section -->
        <section class="table-section">
            <h2>Featured Job Openings</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Company</th>
                            <th>Role</th>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>TechCorp Solutions</td>
                            <td>Frontend Engineer</td>
                            <td>May 28, 2026</td>
                            <td><span class="status-badge interview">Interview</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
