<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job - DevCareers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">DevCareers</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="jobs.html">Find Jobs</a></li>
                <li><a href="post-job.html" class="active">Post a Job</a></li>
                <li><a href="track.html">Track Applications</a></li>
                <li><a href="login.html" class="nav-btn">Sign In</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h2>Post a New Job Opening</h2>
            <p class="section-subtitle">Fill out the details below to find your next great hire.</p>
            <form class="job-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="company-name">Company Name</label>
                    <input type="text" id="company-name" placeholder="e.g., TechCorp Solutions" required>
                </div>
                <div class="form-group">
                    <label for="job-role">Job Role / Title</label>
                    <input type="text" id="job-role" placeholder="e.g., Frontend Engineer" required>
                </div>
                <div class="form-group">
                    <label for="job-type">Job Type</label>
                    <select id="job-type">
                        <option value="full-time">Full-time</option>
                        <option value="part-time">Part-time</option>
                        <option value="remote">Remote</option>
                        <option value="internship">Internship</option>
                    </select>
                </div>
                <button type="button" class="submit-job-btn" onclick="checkAuth('post')">Publish Job Listing</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
